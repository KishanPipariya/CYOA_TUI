name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: macos-latest
            label: macos-universal

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install packaging dependencies
        run: uv sync --locked --extra packaging --extra local-llm

      - name: Build standalone binary
        run: uv run python scripts/build_binary.py

      - name: Smoke test packaged startup
        run: dist/pyinstaller/cyoa-tui/cyoa-tui --help

      - name: Archive packaged app
        shell: bash
        run: |
          mkdir -p dist/release
          tar -C dist/pyinstaller -czf "dist/release/cyoa-tui-${{ matrix.label }}.tar.gz" cyoa-tui
          shasum -a 256 "dist/release/cyoa-tui-${{ matrix.label }}.tar.gz" > "dist/release/SHA256SUMS-${{ matrix.label }}.txt"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cyoa-tui-${{ matrix.label }}
          path: dist/release/*

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/release/*
