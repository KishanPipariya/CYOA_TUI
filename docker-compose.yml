services:
  neo4j:
    image: neo4j:latest
    container_name: cyoa_graph_db
    ports:
      - "7474:7474" # Browser interface
      - "7687:7687" # Bolt routing 
    environment:
      - NEO4J_AUTH=neo4j/cyoa_password # Default auth: user=neo4j, password=cyoa_password
      # Add APOC (Awesome Procedures on Cypher) plugin which is very useful for advanced graphs
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
