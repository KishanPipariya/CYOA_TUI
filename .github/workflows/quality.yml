name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install base dependencies
        run: uv sync --locked --group dev

      - name: Run smoke suite
        run: bash scripts/run_smoke.sh

  quality:
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install base dependencies
        run: uv sync --locked --group dev

      - name: Run tests
        run: uv run pytest --cov=cyoa --cov-report=term-missing --cov-report=xml --cov-report=json -q

      - name: Generate coverage badge
        run: |
          mkdir -p .github/badges
          uv run genbadge coverage -i coverage.xml -o .github/badges/coverage.svg

      - name: Enforce package coverage floors
        run: uv run python scripts/check_coverage.py

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.json
            coverage.xml
            .github/badges/coverage.svg

      - name: Commit coverage badge
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update coverage badge"
          file_pattern: .github/badges/coverage.svg

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy cyoa

  optional-deps:
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install graph test dependencies
        run: uv sync --locked --group dev --extra graph

      - name: Install numpy for interruption tests
        run: uv pip install "numpy>=2.1"

      - name: Run optional dependency coverage
        run: >
          uv run pytest -q
          tests/test_db_integration.py
          tests/test_speculative_interruption.py
          --cov=cyoa.db.graph_db
          --cov=cyoa.llm.providers
          --cov-report=term-missing
          --cov-report=xml:coverage-optional.xml
          --cov-report=json:coverage-optional.json

      - name: Upload optional coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: optional-coverage-report
          path: |
            coverage-optional.json
            coverage-optional.xml
