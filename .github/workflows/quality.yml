name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run smoke suite
        run: bash scripts/run_smoke.sh

      - name: Run tests
        run: uv run pytest --cov=cyoa --cov-report=term-missing --cov-report=xml --cov-report=json -q

      - name: Generate coverage badge
        run: |
          mkdir -p .github/badges
          uv run genbadge coverage -i coverage.xml -o .github/badges/coverage.svg

      - name: Enforce package coverage floors
        run: uv run python scripts/check_coverage.py

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.json
            coverage.xml
            .github/badges/coverage.svg

      - name: Commit coverage badge
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update coverage badge"
          file_pattern: .github/badges/coverage.svg

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy cyoa
